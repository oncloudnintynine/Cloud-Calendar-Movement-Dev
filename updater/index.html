<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Fail-Safe Code Updater</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { darkMode: 'class', theme: { extend: { colors: { darkbase: '#000000', darksurface: '#121212', darkborder: '#2e2e2e', darkinput: '#1e1e1e' } } } }
</script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .spinner { border: 3px solid rgba(255,255,255,.1); width: 20px; height: 20px; border-radius: 50%; border-left-color: #fff; animation: spin 1s linear infinite; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  .hidden { display: none !important; }
</style>
</head>
<body class="bg-darkbase text-gray-100 h-[100dvh] flex flex-col overflow-hidden p-2 md:p-4">

<div class="max-w-3xl mx-auto w-full flex-grow flex flex-col min-h-0">
  <div class="mb-3 shrink-0">
    <h1 class="text-xl md:text-2xl font-bold text-indigo-400 flex items-center gap-2">
      <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
      Fail-Safe Updater
    </h1>
    <p class="text-gray-400 mt-1 text-xs md:text-sm">Isolated client-side GitHub committer. Never caches.</p>
  </div>

  <form id="updater-form" class="bg-darksurface rounded-xl shadow-2xl border border-darkborder flex flex-col flex-grow min-h-0">
    <div class="p-3 md:p-4 space-y-3 flex-grow flex flex-col min-h-0 overflow-y-auto">
      <div class="grid grid-cols-2 gap-3 shrink-0">
        <div>
          <label class="block font-semibold mb-1 text-xs text-gray-300">Repo (owner/repo)</label>
          <input type="text" id="gh-repo" required class="w-full border border-darkborder rounded-lg py-1.5 px-2 bg-darkinput text-white outline-none focus:border-indigo-500 transition text-sm" placeholder="e.g. oncloudnintynine/Cloud-Moves">
        </div>
        <div>
          <label class="block font-semibold mb-1 text-xs text-gray-300">Target Branch</label>
          <input type="text" id="gh-branch" required value="main" class="w-full border border-darkborder rounded-lg py-1.5 px-2 bg-darkinput text-white outline-none focus:border-indigo-500 transition text-sm">
        </div>
      </div>

      <div class="shrink-0">
        <label class="block font-semibold mb-1 text-xs text-gray-300">GitHub Fine-Grained Token</label>
        <input type="password" id="gh-token" required class="w-full border border-darkborder rounded-lg py-1.5 px-2 bg-darkinput text-white outline-none focus:border-indigo-500 transition text-sm" placeholder="Requires Contents (R/W) permissions">
      </div>

      <div class="flex-grow flex flex-col min-h-0">
        <label class="block font-semibold mb-1 text-xs text-gray-300">AI Code Payload</label>
        <textarea id="gh-payload" required class="w-full flex-grow border border-darkborder rounded-lg py-2 px-2 bg-darkinput text-white outline-none focus:border-indigo-500 transition font-mono text-[10px] resize-none" placeholder="Paste the AI output block here..."></textarea>
      </div>
    </div>

    <div class="p-3 bg-[#0a0a0a] border-t border-darkborder shrink-0">
      <div id="status-message" class="hidden mb-2 p-2 rounded-lg text-xs font-semibold text-center"></div>
      <button type="submit" id="submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-lg shadow-md transition flex justify-center items-center gap-2 text-sm">
        <span id="btn-text">Push Code to GitHub</span>
        <div id="btn-spinner" class="spinner hidden"></div>
      </button>
      <div class="text-center mt-2"><a href="../frontend/index.html" class="text-indigo-400 hover:underline text-[11px] font-semibold">← Back to Main App</a></div>
    </div>
  </form>
</div>

<!-- Dynamic Script Loading to bypass cache -->
<script>
  document.write('<script src="updater.js?v=' + new Date().getTime() + '"><\/script>');
</script>
</body>
</html>
