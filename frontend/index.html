<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Moves</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom dark theme colors matching your app */
        body { background-color: #1a1a24; color: #ffffff; }
        .card-container { background-color: #2a2a36; border-color: #3b82f6; }
    </style>
</head>
<body class="p-8">

    <div id="app-container" class="max-w-3xl mx-auto space-y-6">
        
        <div id="item-1" class="card-container relative border rounded-lg p-6 shadow-md transition-all">
            
            <div class="absolute top-3 right-3 flex items-center gap-3">
                
                <button onclick="handleEdit(1)" class="text-blue-500 hover:text-blue-400 transition-colors focus:outline-none" aria-label="Edit" title="Edit">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path>
                    </svg>
                </button>

                <button onclick="handleCancel(1)" class="text-red-500 hover:text-red-400 transition-colors focus:outline-none" aria-label="Cancel" title="Cancel">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <div class="pr-16">
                <h2 class="text-xl font-semibold mb-2">Cloud Infrastructure Migration</h2>
                <p class="text-gray-400 text-sm">Target: AWS us-east-1</p>
                <div class="mt-4">
                    <span class="inline-block bg-blue-900 text-blue-200 text-xs px-2 py-1 rounded">In Progress</span>
                </div>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
