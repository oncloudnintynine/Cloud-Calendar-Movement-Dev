<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Team Admin Manager</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-200 min-h-screen flex flex-col text-sm">

  <div id="dev-banner" class="bg-red-600 text-white text-center py-1 text-xs font-bold tracking-widest hidden">DEV MODE</div>

  <!-- Navbar (Compacted) -->
  <nav class="bg-white dark:bg-gray-800 shadow-sm border-b dark:border-gray-700 px-3 py-1.5 flex justify-between items-center sticky top-0 z-50">
    <div class="font-bold text-base text-blue-600 dark:text-blue-400">Team Admin Manager</div>
    <div class="flex items-center space-x-1 md:space-x-2">
      <span id="nav-user-name" class="font-semibold hidden md:block mr-2"></span>
      <button onclick="toggleTheme()" class="text-lg p-1.5 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition">🌗</button>
      <button onclick="animateAndUpdate(this)" class="p-1.5 text-gray-500 hover:text-blue-600 dark:hover:text-blue-400 rounded-full transition" title="Clear Cache">
        <svg class="w-5 h-5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
      </button>
      <button id="logout-btn" onclick="logout()" class="p-1.5 text-gray-500 hover:text-red-600 dark:hover:text-red-400 rounded-full transition hidden" title="Logout">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
      </button>
    </div>
  </nav>

  <main class="flex-grow flex flex-col p-2 md:p-3 w-full max-w-5xl mx-auto relative">
    <div id="loader" class="absolute inset-0 bg-white/80 dark:bg-gray-900/80 z-40 flex-col items-center justify-center hidden">
      <div class="spinner mb-2"></div><p class="font-medium">Processing...</p>
    </div>

    <!-- Login View -->
    <section id="login-view" class="flex flex-col items-center justify-center flex-grow">
      <div class="bg-white dark:bg-gray-800 p-5 rounded-xl shadow-lg w-full max-w-sm border dark:border-gray-700">
        <h2 class="text-xl font-bold mb-1 text-center">Welcome</h2>
        <p class="text-center text-xs text-gray-500 mb-4">Enter your password to continue</p>
        <div id="login-alert" class="hidden bg-red-100 text-red-700 text-xs p-2 rounded mb-3 text-center"></div>
        <div class="mb-4 relative">
          <label class="block font-medium mb-1">Password</label>
          <input type="password" id="login-pass" class="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg py-1.5 px-2 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none pr-10">
          <button onclick="togglePassword('login-pass', this)" class="absolute right-2 top-7 text-gray-500">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
          </button>
        </div>
        <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow">Login</button>
      </div>
    </section>

    <!-- App / Tabs View -->
    <section id="app-view" class="hidden-view flex-col flex-grow">
      <!-- Tabs -->
      <div class="flex space-x-1 mb-3 border-b dark:border-gray-700 overflow-x-auto pb-1">
        <button onclick="switchTab('dashboard')" id="tab-dashboard" class="px-3 py-1.5 font-semibold border-b-2 border-blue-600 text-blue-600 whitespace-nowrap hidden">Dashboard</button>
        <button onclick="switchTab('my-leaves')" id="tab-my-leaves" class="px-3 py-1.5 font-semibold text-gray-500 border-b-2 border-transparent whitespace-nowrap hidden">My Leave/MC/OIL</button>
        <button onclick="switchTab('submit-leave')" id="tab-submit-leave" class="px-3 py-1.5 font-semibold text-gray-500 border-b-2 border-transparent whitespace-nowrap hidden">Update Leave/MC/OIL</button>
        <button onclick="switchTab('submit-event')" id="tab-submit-event" class="px-3 py-1.5 font-semibold text-gray-500 border-b-2 border-transparent whitespace-nowrap hidden">Update Event</button>
        <button onclick="switchTab('admin')" id="tab-admin" class="px-3 py-1.5 font-semibold text-gray-500 border-b-2 border-transparent whitespace-nowrap hidden">Admin Settings</button>
      </div>

      <!-- Dashboard Tab -->
      <div id="view-dashboard" class="tab-content hidden-view flex-grow flex-col">
        <div class="flex flex-col md:flex-row justify-between mb-3 gap-2">
          <input type="text" id="dash-search" placeholder="Search names..." class="w-full md:w-auto border-2 border-gray-300 dark:border-gray-600 rounded-lg py-1.5 px-3 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 outline-none shadow-sm" onkeyup="filterDashboard()">
          <select id="dash-dept" class="w-full md:w-auto border-2 border-gray-300 dark:border-gray-600 rounded-lg py-1.5 px-3 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 outline-none shadow-sm" onchange="filterDashboard()">
            <option value="">All Departments</option>
          </select>
        </div>
        
        <div class="hidden md:block overflow-x-auto bg-white dark:bg-gray-800 rounded-lg shadow-sm border dark:border-gray-700">
          <table class="w-full text-left whitespace-nowrap">
            <thead class="bg-gray-100 dark:bg-gray-700"><tr><th class="px-2 py-1.5">Name</th><th class="px-2 py-1.5">Dept</th><th class="px-2 py-1.5">Type</th><th class="px-2 py-1.5">Dates</th><th class="px-2 py-1.5">Status</th></tr></thead>
            <tbody id="dash-body-desktop" class="divide-y dark:divide-gray-700"></tbody>
          </table>
        </div>
        <div class="md:hidden grid gap-2" id="dash-body-mobile"></div>
      </div>

      <!-- My Leaves Tab -->
      <div id="view-my-leaves" class="tab-content hidden-view flex-col">
        <div id="active-leaves-container" class="grid gap-2"></div>
        <div id="cancelled-leaves-container" class="mt-2"></div>
      </div>

      <!-- Submit Leave Form Tab -->
      <div id="view-submit-leave" class="tab-content hidden-view max-w-xl mx-auto w-full">
        <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow border dark:border-gray-700">
          <form id="leave-form" onsubmit="event.preventDefault(); submitForm('leave');" class="space-y-3">
            <div>
              <label class="block font-semibold mb-1">Leave Type</label>
              <select id="form-leave-type" class="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg py-1.5 px-3 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 outline-none shadow-sm" onchange="toggleOverseasFields()" required></select>
            </div>
            <div class="flex space-x-2">
              <div class="flex-grow"><label class="block font-semibold mb-1">Start Date</label><input type="date" id="form-leave-start" class="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg py-1.5 px-3 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 outline-none" required></div>
              <div class="w-20 shrink-0"><label class="block font-semibold mb-1 text-center">Time</label>
                <div class="relative flex bg-gray-200 dark:bg-gray-600 rounded-lg p-1 h-[36px] cursor-pointer select-none" onclick="toggleTime('start','leave')">
                  <div id="start-leave-slider" class="absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-blue-600 rounded transition-transform"></div>
                  <div class="relative z-10 flex-1 flex items-center justify-center font-bold text-white transition-colors" id="start-leave-am">AM</div>
                  <div class="relative z-10 flex-1 flex items-center justify-center font-bold text-gray-500 dark:text-gray-300 transition-colors" id="start-leave-pm">PM</div>
                </div>
              </div>
            </div>
            <div class="flex space-x-2">
              <div class="flex-grow"><label class="block font-semibold mb-1">End Date</label><input type="date" id="form-leave-end" class="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg py-1.5 px-3 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 outline-none" required></div>
              <div class="w-20 shrink-0"><label class="block font-semibold mb-1 text-center">Time</label>
                <div class="relative flex bg-gray-200 dark:bg-gray-600 rounded-lg p-1 h-[36px] cursor-pointer select-none" onclick="toggleTime('end','leave')">
                  <div id="end-leave-slider" class="absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-blue-600 rounded transition-transform translate-x-full"></div>
                  <div class="relative z-10 flex-1 flex items-center justify-center font-bold text-gray-500 dark:text-gray-300 transition-colors" id="end-leave-am">AM</div>
                  <div class="relative z-10 flex-1 flex items-center justify-center font-bold text-white transition-colors" id="end-leave-pm">PM</div>
                </div>
              </div>
            </div>
            <div>
              <label class="block font-semibold mb-1">Covering Person</label>
              <input type="text" id="form-leave-cover" class="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg py-1.5 px-3 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 outline-none shadow-sm" required>
            </div>
            <div id="overseas-fields" class="hidden-view grid grid-cols-2 gap-2 p-3 bg-gray-50 dark:bg-gray-700 rounded-lg border-2 border-gray-200 dark:border-gray-600">
              <div><label class="block font-semibold mb-1">Country <span class="text-red-500">*</span></label><input type="text" id="form-leave-country" class="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg py-1 px-2 bg-white dark:bg-gray-800 outline-none shadow-sm"></div>
              <div><label class="block font-semibold mb-1 text-gray-500">State (Opt)</label><input type="text" id="form-leave-state" class="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg py-1 px-2 bg-white dark:bg-gray-800 outline-none shadow-sm"></div>
            </div>
            <div>
              <label class="block font-semibold mb-1">Remarks</label>
              <textarea id="form-leave-remarks" rows="1" class="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg py-1.5 px-3 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 outline-none shadow-sm"></textarea>
            </div>
            <button type="submit" id="submit-leave-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg shadow">Save Record</button>
            <button type="button" id="cancel-edit-leave-btn" onclick="cancelEditMode()" class="w-full bg-gray-500 hover:bg-gray-600 text-white font-bold py-1.5 rounded-lg shadow hidden-view mt-2">Cancel Edit</button>
          </form>
        </div>
      </div>

      <!-- Submit Event Form Tab -->
      <div id="view-submit-event" class="tab-content hidden-view max-w-xl mx-auto w-full">
        <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow border dark:border-gray-700">
          <form id="event-form" onsubmit="event.preventDefault(); submitForm('event');" class="space-y-3">
            <div>
              <label class="block font-semibold mb-1">Event Title</label>
              <input type="text" id="form-event-name" class="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg py-1.5 px-3 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 outline-none shadow-sm" placeholder="e.g. Planning Seminar" required>
            </div>
            <div class="flex space-x-2">
              <div class="flex-grow"><label class="block font-semibold mb-1">Start Date</label><input type="date" id="form-event-start" class="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg py-1.5 px-3 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 outline-none" required></div>
              <div class="w-20 shrink-0"><label class="block font-semibold mb-1 text-center">Time</label>
                <div class="relative flex bg-gray-200 dark:bg-gray-600 rounded-lg p-1 h-[36px] cursor-pointer select-none" onclick="toggleTime('start','event')">
                  <div id="start-event-slider" class="absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-blue-600 rounded transition-transform"></div>
                  <div class="relative z-10 flex-1 flex items-center justify-center font-bold text-white transition-colors" id="start-event-am">AM</div>
                  <div class="relative z-10 flex-1 flex items-center justify-center font-bold text-gray-500 dark:text-gray-300 transition-colors" id="start-event-pm">PM</div>
                </div>
              </div>
            </div>
            <div class="flex space-x-2">
              <div class="flex-grow"><label class="block font-semibold mb-1">End Date</label><input type="date" id="form-event-end" class="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg py-1.5 px-3 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 outline-none" required></div>
              <div class="w-20 shrink-0"><label class="block font-semibold mb-1 text-center">Time</label>
                <div class="relative flex bg-gray-200 dark:bg-gray-600 rounded-lg p-1 h-[36px] cursor-pointer select-none" onclick="toggleTime('end','event')">
                  <div id="end-event-slider" class="absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-blue-600 rounded transition-transform translate-x-full"></div>
                  <div class="relative z-10 flex-1 flex items-center justify-center font-bold text-gray-500 dark:text-gray-300 transition-colors" id="end-event-am">AM</div>
                  <div class="relative z-10 flex-1 flex items-center justify-center font-bold text-white transition-colors" id="end-event-pm">PM</div>
                </div>
              </div>
            </div>
            <div>
              <label class="block font-semibold mb-1">Remarks (Optional)</label>
              <textarea id="form-event-remarks" rows="1" class="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg py-1.5 px-3 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 outline-none shadow-sm"></textarea>
            </div>
            <button type="submit" id="submit-event-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg shadow">Save Event</button>
            <button type="button" id="cancel-edit-event-btn" onclick="cancelEditMode()" class="w-full bg-gray-500 hover:bg-gray-600 text-white font-bold py-1.5 rounded-lg shadow hidden-view mt-2">Cancel Edit</button>
          </form>
        </div>
      </div>
      
      <!-- Admin Tab Omitted for brevity (same structure, reduced padding) -->
      <div id="view-admin" class="tab-content hidden-view max-w-xl mx-auto w-full">
        <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow border dark:border-gray-700 space-y-3">
          <h2 class="text-lg font-bold border-b pb-1 dark:border-gray-700">Global Configuration</h2>
          <div>
            <label class="block font-semibold mb-1">Change Admin Password</label>
            <div class="relative">
              <input type="password" id="set-admin-pass" class="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg py-1.5 px-3 bg-white dark:bg-gray-700 placeholder-gray-400 outline-none">
              <button onclick="togglePassword('set-admin-pass', this)" class="absolute right-2 top-2 text-gray-500"><svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg></button>
            </div>
          </div>
          <div><label class="block font-semibold mb-1">Leave Types</label><input type="text" id="set-leave-types" class="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg py-1.5 px-3 bg-white dark:bg-gray-700 outline-none"></div>
          <div><label class="block font-semibold mb-1">KAH Limit (%)</label><input type="number" id="set-kah-limit" class="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg py-1.5 px-3 bg-white dark:bg-gray-700 outline-none"></div>
          <div><label class="block font-semibold mb-1">Approving Authority Email</label><input type="email" id="set-appr-email" class="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg py-1.5 px-3 bg-white dark:bg-gray-700 outline-none"></div>
          <div>
            <label class="block font-semibold mb-1">KAH Personnel Search</label>
            <input type="text" id="kah-search" placeholder="Type name..." class="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg py-1.5 px-3 bg-white dark:bg-gray-700 mb-1 outline-none" onkeyup="searchKAH()">
            <div id="kah-results" class="bg-gray-100 dark:bg-gray-700 max-h-24 overflow-y-auto rounded-lg"></div>
            <div class="mt-2 font-bold">Current KAH List:</div>
            <ul id="kah-selected-list" class="space-y-1 bg-gray-50 dark:bg-gray-900 p-2 rounded-lg border-2 dark:border-gray-700 min-h-[40px] mt-1"></ul>
          </div>
          <button onclick="saveAdminSettings()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded-lg shadow mt-2">Save Settings</button>
        </div>
      </div>
    </section>
  </main>

  <script src="config.js"></script><script src="api.js"></script><script src="app.js"></script><script src="admin.js"></script>
</body>
</html>
